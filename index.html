<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles/rock-paper-scissors.css">
</head>
<body>
  <p class="title">Rock Paper Scissors Game</p>

  <button class="move-button js-rock-button">
    <img src="images/rock-emoji.png" alt="rock" class="move-icon">
  </button>

  <button class="move-button js-paper-button">
    <img src="images/paper-emoji.png" alt="paper" class="move-icon">
  </button>

  <button class="move-button js-scissors-button">
    <img src="images/scissors-emoji.png" alt="scissors" class="move-icon">
  </button>

  <p class="js-result result"></p>
  <p class="js-choice choice"> </p>
  <p class="js-score score"></p>

  <button class="reset-score-button js-reset-score-button">Reset
  </button>

   <button class="autoplay-button js-autoplay-button">
    AutoPlay
  </button>

  <p class="js-confirmation-msg"></p>

  <script src="scripts/rock-paper-scissors.js"></script>
</body>
</html>
